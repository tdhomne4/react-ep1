<body>
	<p>Hello from before root</p>
	<div id="root">
		<h1>tesing here</h1>
	</div>
	<p>Hello from after root</p>
	<div id="root1"></div>
	
	<!--simple program using javascript-->
	<script>
		const heading1 = document.createElement("h1");
		heading1.innerHTML = "Hello from js!!!!!!!";
		const root1 = document.getElementById("root1");
		root1.appendChild(heading1);
	
	</script>
